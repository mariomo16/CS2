trusted_launch                              // This command controls the trusted launch feature in CS2, which enhances the game's security measures.

hud_fastswitch                              // Controls how quickly players can switch between weapons. When enabled, players can switch weapons faster without needing to see the weapon selection menu.

player_nevershow_communityservermessage     // This console command is used to toggle between whether you want to show the custom message whenever you join a community server that has one.
screenmessage_show                          // Enable display of console messages on screen. This command controls whether console messages are also shown directly on the game screen. It can be enabled, disabled, or set to automatically enable if the VGUI (Valve's graphical user interface) is not present.

speaker_config                              // This command is used to set the speaker configuration.

cl_show_clan_in_death_notice                // This console command determines whether or not a player's clan tag shows up in your kill feed. By default this is turned on, but it can be turned off.

voice_vox                                   // Toggles the use of VOX (voice-operated exchange), allowing the voice chat to be always on without the need to press a push-to-talk button.

spec_autodirector                           // This command enables or disables the auto-director feature while spectating games. The auto-director automatically chooses the best view modes and perspectives.

buddha                                      // Entering this command toggles buddha mode on and off. Buddha mode means that you still take damage when shot, but you can't die. When you reach 0 hp your health bar will show 1 hp, no matter how much you keep getting shot. It works very similarly to the "god" command to toggle god mode.

